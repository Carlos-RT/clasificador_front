<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Detector de Algoritmos de Cifrado</title>

<style>

body{
font-family: Arial;
background:#f2f5f9;
margin:0;
padding:0;
}

.container{
max-width:500px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 6px 15px rgba(0,0,0,0.1);
}

h1{
text-align:center;
font-size:22px;
}

textarea{
width:100%;
height:120px;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
font-size:14px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#2c7be5;
color:white;
font-size:16px;
cursor:pointer;
margin-top:15px;
}

button:hover{
background:#1a5fc4;
}

.result{
margin-top:20px;
padding:15px;
border-radius:10px;
background:#eef3ff;
text-align:center;
font-size:16px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h1>Detector de Algoritmos de Cifrado</h1>

<p>
Escribe un texto cifrado y la IA intentará identificar qué algoritmo se utilizó.
</p>

<textarea id="texto" placeholder="Ej: SGVsbG8gd29ybGQ="></textarea>

<button onclick="analizarTexto()">Detectar cifrado</button>

<div id="resultado" class="result">
Resultado: ---
</div>

</div>

</div>

<script>

async function analizarTexto(){

    const data = {
        texto: document.getElementById("texto").value
    };

    try{

        const res = await fetch("https://clasificador-back.vercel.app/",{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify(data)
        });

        const resultado = await res.json();

        document.getElementById("resultado").innerText =
        "Resultado: " + resultado.prediccion;

    }catch(error){

        document.getElementById("resultado").innerText =
        "Error conectando con el servidor";

    }

}

</script>

</body>
</html>
