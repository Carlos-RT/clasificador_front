<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clasificador de Flores Iris</title>

<style>

body{
font-family: Arial, Helvetica, sans-serif;
background:#f2f5f9;
margin:0;
padding:0;
}

.container{
max-width:500px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 6px 15px rgba(0,0,0,0.1);
}

h1{
text-align:center;
font-size:22px;
margin-bottom:10px;
}

.description{
text-align:center;
font-size:14px;
color:#555;
margin-bottom:20px;
}

.field{
display:flex;
flex-direction:column;
margin-bottom:15px;
}

label{
font-size:14px;
margin-bottom:5px;
}

input{
padding:10px;
border-radius:8px;
border:1px solid #ccc;
font-size:14px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#2c7be5;
color:white;
font-size:16px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#1a5fc4;
}

.result{
margin-top:20px;
padding:15px;
border-radius:10px;
background:#eef3ff;
text-align:center;
font-size:16px;
font-weight:bold;
}

.footer{
text-align:center;
font-size:12px;
color:#777;
margin-top:15px;
}

</style>
</head>

<body>

<div class="container">

<div class="card">

<h1>Clasificador de Flores Iris</h1>

<p class="description">
Demo de una red neuronal que clasifica flores Iris según sus medidas.
</p>

<div class="field">
<label>Sepal Length (cm)</label>
<input id="sepal_length" type="number" step="0.1" placeholder="Ej: 5.1">
</div>

<div class="field">
<label>Sepal Width (cm)</label>
<input id="sepal_width" type="number" step="0.1" placeholder="Ej: 3.5">
</div>

<div class="field">
<label>Petal Length (cm)</label>
<input id="petal_length" type="number" step="0.1" placeholder="Ej: 1.4">
</div>

<div class="field">
<label>Petal Width (cm)</label>
<input id="petal_width" type="number" step="0.1" placeholder="Ej: 0.2">
</div>

<button onclick="clasificarFlor()">Clasificar flor</button>

<div id="resultado" class="result">
Resultado: ---
</div>

<div class="footer">
Dataset: Iris Flower Dataset
</div>

</div>

</div>

<script>

async function clasificarFlor(){

    const data = {
        sepal_length: document.getElementById("sepal_length").value,
        sepal_width: document.getElementById("sepal_width").value,
        petal_length: document.getElementById("petal_length").value,
        petal_width: document.getElementById("petal_width").value
    };

    try{

        const res = await fetch("http://127.0.0.1:5000/api/predict",{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify(data)
        });

        const resultado = await res.json();

        document.getElementById("resultado").innerText =
        "Resultado: " + resultado.prediccion;

    }catch(error){

        document.getElementById("resultado").innerText =
        "Error conectando con el servidor";

    }

}

</script>

</body>
</html>
