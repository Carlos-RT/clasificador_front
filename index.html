<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Detector de Cifrados con IA</title>

<style>

body{
font-family: Arial, Helvetica, sans-serif;
background:#f2f5f9;
margin:0;
padding:0;
}

.container{
max-width:600px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 6px 15px rgba(0,0,0,0.1);
}

h1{
text-align:center;
font-size:22px;
margin-bottom:10px;
}

.description{
text-align:center;
font-size:14px;
color:#555;
margin-bottom:20px;
}

textarea{
width:100%;
height:130px;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
font-size:14px;
resize:none;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#2c7be5;
color:white;
font-size:16px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#1a5fc4;
}

.result{
margin-top:20px;
padding:15px;
border-radius:10px;
background:#eef3ff;
font-size:16px;
font-weight:bold;
white-space:pre-line;
}

.footer{
text-align:center;
font-size:12px;
color:#777;
margin-top:15px;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h1>Detector de Algoritmos de Cifrado</h1>

<p class="description">
Escribe un texto cifrado y la IA intentará identificar qué algoritmo se utilizó y descifrarlo.
</p>

<textarea id="texto" placeholder="Ejemplo: SGVsbG8gd29ybGQ="></textarea>

<button onclick="detectar()">Detectar cifrado</button>

<button onclick="detectarDescifrar()">Detectar y desencriptar</button>

<div id="resultado" class="result">
Resultado: ---
</div>

<div class="footer">
IA basada en red neuronal (MLP)
</div>

</div>

</div>

<script>

async function detectar(){

    const texto = document.getElementById("texto").value;

    const data = {
        texto: texto
    };

    try{

        const res = await fetch("https://clasificador-back.vercel.app/",{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify(data)
        });

        const resultado = await res.json();

        document.getElementById("resultado").innerText =
        "Tipo detectado: " + resultado.prediccion;

    }catch(error){

        document.getElementById("resultado").innerText =
        "Error conectando con el servidor";

    }

}


async function detectarDescifrar(){

    const texto = document.getElementById("texto").value;

    const data = {
        texto: texto
    };

    try{

        const res = await fetch("https://clasificador-back.vercel.app/",{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify(data)
        });

        const resultado = await res.json();

        document.getElementById("resultado").innerText =
        "Tipo detectado: " + resultado.prediccion +
        "\n\nTexto descifrado:\n" + resultado.descifrado;

    }catch(error){

        document.getElementById("resultado").innerText =
        "Error conectando con el servidor";

    }

}

</script>

</body>
</html>
